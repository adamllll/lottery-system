spring.application.name=lottery-system

## logback xml
logging.config=classpath:logback-spring.xml
spring.profiles.active=dev,local

## MySql ##
# JDBC driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JDBC URL
spring.datasource.url=jdbc:mysql://localhost:3306/lottery_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
# DB username
spring.datasource.username=root
# DB password
spring.datasource.password=root

## MyBatis ##
# mybatis.mapper-locations=classpath:mapper/*Mapper.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-handlers-package=org.adam.lotterysystem.dao.handler
spring.jackson.time-zone=Asia/Shanghai

## Dypns SMS Verify ##
# Prefer env vars in real deployment
sms.access-key-id=${SMS_ACCESS_KEY_ID:}
sms.access-key-secret=${SMS_ACCESS_KEY_SECRET:}
sms.endpoint=dypnsapi.aliyuncs.com

# From console: gift sign/template config
sms.sign-name=\u901f\u901a\u4e92\u8054\u9a8c\u8bc1\u7801
sms.template-code=100001
sms.scheme-name=\u6d4b\u8bd5\u65b9\u6848

# Optional defaults
sms.country-code=86
sms.code-length=4
sms.valid-time=300
sms.duplicate-policy=1
sms.interval=60
sms.code-type=1
sms.auto-retry=1

## redis ##
spring.data.redis.host=localhost
spring.data.redis.port=6379
# 连接空闲超过N(s秒、ms毫秒)后关闭，0为禁⽤，这⾥配置值和tcp-keepalive值⼀致
spring.data.redis.timeout=60s
# 默认使⽤ lettuce 连接池
# 允许最⼤连接数，默认8（负值表⽰没有限制）
spring.data.redis.lettuce.pool.max-active=8
# 最⼤空闲连接数，默认8
spring.data.redis.lettuce.pool.max-idle=8
# 最⼩空闲连接数，默认0
spring.data.redis.lettuce.pool.min-idle=0
# 连接⽤完时，新的请求等待时间(s秒、ms毫秒)，超过该时间抛出异常 JedisConnectionException，(默认-1，负值表⽰没有限制)
spring.data.redis.lettuce.pool.max-wait=5s

##文件上传相关配置
# 目标路径
pic.local-path=./pic/
# spring boot3 升级配置名
spring.web.resources.static-locations=classpath:/static/,file:${pic.local-path}

## mq ##
spring.rabbitmq.host=127.0.0.1
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin
#消息确认机制，默认auto
spring.rabbitmq.listener.simple.acknowledge-mode=auto

# 监听器重试（Spring Boot 4 起 max-attempts 已废弃，改用 max-retries）
# 旧配置 max-attempts=5 迁移后建议 max-retries=4（总尝试次数约等于原 5 次）
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-retries=4

## 邮件 ##
spring.mail.host=smtp.qq.com
spring.mail.username=${MAIL_USERNAME}
# 你的授权码：邮箱设置-》第三⽅服务-》开启IMAP/SMTP服务-》获取授权码
spring.mail.password=${MAIL_PASSWORD}
spring.mail.port=587
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.auth=true

## 线程池 ##
async.executor.thread.core_pool_size=10
async.executor.thread.max_pool_size=20
async.executor.thread.queue_capacity=20
async.executor.thread.name.prefix=async-service-